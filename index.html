<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下载中心</title>
    <meta name="apple-mobile-web-app-title" content="永久链接">
    <link rel="apple-touch-icon-precomposed" sizes="180x180" href="./image/touch-icon-iphone.png">
    <meta name="apple-touch-fullscreen" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="style.css">
    <style>
        body,
        html {
            background: #FFFFFF;
            color: #152033;
        }

        .container {
            max-width: 520px;
            padding: 28px 20px 36px;
        }

        .content h2 {
            margin: 8px 0 22px;
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: 0.01em;
            color: #152033;
        }

        .download-buttons {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .download-item {
            margin: 0;
            display: contents;
        }

        .download-card {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: space-between;
            gap: 18px;
            width: 100%;
            aspect-ratio: 1 / 1;
            margin: 0;
            padding: 20px;
            border: 1px solid #D7E7FF;
            border-radius: 22px;
            background:
                linear-gradient(180deg, #FFFFFF 0%, #F7FBFF 100%);
            box-shadow: 0 12px 28px rgba(38, 130, 255, 0.08);
            text-decoration: none;
            transition:
                transform 0.2s ease,
                box-shadow 0.2s ease,
                border-color 0.2s ease;
        }

        .download-card:hover {
            transform: translateY(-2px);
            border-color: #9CC4FF;
            box-shadow: 0 18px 36px rgba(38, 130, 255, 0.14);
        }

        .download-card__body {
            min-width: 0;
            flex: 1;
            text-align: left;
        }

        .download-card__eyebrow {
            display: inline-flex;
            align-items: center;
            min-height: 26px;
            padding: 0 10px;
            border-radius: 999px;
            background: #EAF3FF;
            color: #2682FF;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .download-card__title {
            display: block;
            margin-top: 10px;
            color: #152033;
            font-size: 1.04rem;
            font-weight: 700;
            line-height: 1.3;
        }

        .download-card__meta {
            display: block;
            margin-top: 5px;
            color: #5E6C84;
            font-size: 0.84rem;
            line-height: 1.45;
        }

        .download-card__cta {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 44px;
            padding: 0 16px;
            border-radius: 999px;
            background: #2682FF;
            color: #FFFFFF;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            box-shadow: 0 10px 20px rgba(38, 130, 255, 0.2);
        }

        @media (max-width: 520px) {
            .container {
                padding: 24px 16px 32px;
            }

            .download-buttons {
                gap: 12px;
            }

            .download-card {
                padding: 16px;
                gap: 14px;
                border-radius: 18px;
            }

            .download-card__title {
                font-size: 0.98rem;
            }

            .download-card__meta {
                font-size: 0.8rem;
            }

            .download-card__cta {
                min-height: 40px;
                padding: 0 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
       
        
        <section class="content">
            <h2>请选择您的设备下载</h2>
            <div class="download-buttons">
                <div class="download-item">
                    <a href="#" class="download-card" id="android-download">
                        <span class="download-card__body">
                            <span class="download-card__eyebrow" id="android-download-tag">ANDROID</span>
                            <span class="download-card__title" id="android-download-title">Android</span>
                            <span class="download-card__meta" id="android-download-meta">安装包下载 | v3.2.0.apk</span>
                        </span>
                        <span class="download-card__cta" id="android-download-cta">立即下载</span>
                    </a>
                </div>
                <div class="download-item">
                    <a href="#" class="download-card" id="ios-web-download">
                        <span class="download-card__body">
                            <span class="download-card__eyebrow" id="ios-web-download-tag">IOS</span>
                            <span class="download-card__title" id="ios-web-download-title">iOS 网页版</span>
                            <span class="download-card__meta" id="ios-web-download-meta">Safari 或浏览器打开使用</span>
                        </span>
                        <span class="download-card__cta" id="ios-web-download-cta">前往</span>
                    </a>
                </div>
                <div class="download-item">
                    <a href="#" class="download-card" id="windows-download">
                        <span class="download-card__body">
                            <span class="download-card__eyebrow" id="windows-download-tag">WINDOWS</span>
                            <span class="download-card__title" id="windows-download-title">Windows</span>
                            <span class="download-card__meta" id="windows-download-meta">桌面端安装包 | V4.3.0.exe</span>
                        </span>
                        <span class="download-card__cta" id="windows-download-cta">立即下载</span>
                    </a>
                </div>
                <div class="download-item">
                    <a href="#" class="download-card" id="macos-download">
                        <span class="download-card__body">
                            <span class="download-card__eyebrow" id="macos-download-tag">MACOS</span>
                            <span class="download-card__title" id="macos-download-title">macOS</span>
                            <span class="download-card__meta" id="macos-download-meta">桌面端安装包 | v3.5.0.pkg</span>
                        </span>
                        <span class="download-card__cta" id="macos-download-cta">立即下载</span>
                    </a>
                </div>
            </div>

            
        </section>
        
       
    </div>
    <script>
        (function () {
            var platformTargets = {
                android: {
                    url: "https://github.com/lbvpn/ok1357.github.io/releases/download/qingyi-latest-apk/qingyi-v3.5.0-35.apk",
                    version: "v3.5.0",
                    extension: "apk",
                    label: "Android",
                    tag: "ANDROID",
                    metaPrefix: "安装包下载",
                    action: "立即下载"
                },
                windows: {
                    url: "https://github.com/lbvpn/ok1357.github.io/releases/download/qingyi-latest-exe/qingyi-v4.5.0-22.exe",
                    version: "v4.5.0",
                    extension: "exe",
                    label: "Windows",
                    tag: "WINDOWS",
                    metaPrefix: "桌面端安装包",
                    action: "立即下载"
                },
                macos: {
                    url: "https://github.com/lbvpn/ok1357.github.io/releases/download/qingyi-latest-pkg/qingyi-v3.6.0-73.pkg",
                    version: "v3.6.0",
                    extension: "pkg",
                    label: "macOS",
                    tag: "MACOS",
                    metaPrefix: "桌面端安装包",
                    action: "立即下载"
                },
                "ios-web": {
                    url: "web/index.html",
                    label: "iOS 网页版",
                    tag: "IOS",
                    meta: "Safari 或浏览器打开使用",
                    action: "前往"
                }
            };

            function applyDownloadTarget(elementId, targetKey) {
                var element = document.getElementById(elementId);
                var tag = document.getElementById(elementId + "-tag");
                var title = document.getElementById(elementId + "-title");
                var meta = document.getElementById(elementId + "-meta");
                var cta = document.getElementById(elementId + "-cta");
                var target = platformTargets[targetKey];

                if (!element || !target) {
                    return;
                }

                element.href = target.url;

                if (tag && target.tag) {
                    tag.textContent = target.tag;
                }

                if (title && target.label) {
                    title.textContent = target.label;
                }

                if (meta) {
                    meta.textContent = target.version
                        ? target.metaPrefix + " | " + target.version + "." + target.extension
                        : target.meta;
                }

                if (cta && target.action) {
                    cta.textContent = target.action;
                }
            }

            applyDownloadTarget("android-download", "android");
            applyDownloadTarget("ios-web-download", "ios-web");
            applyDownloadTarget("windows-download", "windows");
            applyDownloadTarget("macos-download", "macos");
        })();
    </script>
</body>
</html>
